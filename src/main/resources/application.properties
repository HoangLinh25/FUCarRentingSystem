spring.application.name=SE2034_LinhHVHE194496_FUCarRentingSystem

# ==========================================
# 1. CẤU HÌNH KẾT NỐI DATABASE (SQL SERVER)
# ==========================================
# Thay 'sa' và '123' bằng tài khoản/mật khẩu SQL Server của bạn
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=FUCarRentingSystemDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==========================================
# 2. CẤU HÌNH JPA / HIBERNATE
# ==========================================
# 'update': Tự động tạo bảng hoặc cập nhật schema khi entity thay đổi
spring.jpa.hibernate.ddl-auto=update

# Hiển thị câu lệnh SQL trên console để dễ debug
spring.jpa.show-sql=true

# Định dạng lại câu lệnh SQL trên console cho dễ nhìn
spring.jpa.properties.hibernate.format_sql=true

# Chỉ định rõ Dialect của SQL Server để Hibernate tối ưu truy vấn
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect

# ==========================================
# 3. CẤU HÌNH THYMELEAF (GIAO DIỆN)
# ==========================================
# Tắt cache Thymeleaf để HTML cập nhật ngay khi sửa code mà không cần restart server
spring.thymeleaf.cache=false